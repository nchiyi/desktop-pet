<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Pet - Chat</title>
    <style>
      /* Reset browser default 8px body margin so ChatApp's `height: 100vh`
         outer container fits exactly within the webview, eliminating an
         outer body-level scrollbar that competed with MessageList's own. */
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/windows/chat/main.tsx"></script>
  </body>
</html>
